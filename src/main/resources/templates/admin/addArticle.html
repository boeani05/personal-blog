<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin – Create Article</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<div class="admin-shell">

    <div class="admin-header">
        <div>
            <h1 class="admin-title">Create Article</h1>
            <p class="muted admin-subtitle">Write and publish a new post</p>
        </div>

        <div class="admin-actions">
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back</a>

            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="link-btn">Logout</button>
            </form>
        </div>
    </div>

    <div class="admin-card">

        <div th:if="${param.error}" class="alert alert-error" role="alert" aria-live="polite">
            <span th:if="${param.error[0] == 'missingTitle'}">
                Please enter a title.
            </span>
            <span th:if="${param.error[0] == 'missingContent'}">
                Please enter content.
            </span>
            <span th:if="${param.error[0] != 'missingTitle' and param.error[0] != 'missingContent'}">
                Something went wrong. Please try again.
            </span>
        </div>

        <form th:action="@{/admin/dashboard}" method="post" class="admin-form">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="articleTitle" required>
            </div>

            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="articleContent" rows="14" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Save Article</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
